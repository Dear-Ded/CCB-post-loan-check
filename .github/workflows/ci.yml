name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-full:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Node dependencies
        run: npm ci
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Verify JavaScript and contracts
        run: npm test
      - name: Verify cross-platform loadability
        run: npm run test:loadability

  linux-doubao:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Verify shared contracts
        run: npm run check:js && npm run test:platform-contracts && npm run test:loadability
      - name: Verify Doubao Linux scripts
        run: npm run check:bash
